{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO LIST - Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="{% static 'stylesheet.css' %}">
</head>
<body>

    <div class="container py-5">
        <h3 class="text-center mb-4">ToDo App</h3>

        <div class="row">
            <div class="col-md-7 col-lg-7 mb-4">
                <div class="d-flex justify-content-between align-items-center">
                    <h4>My Day</h4>
                    <p class="text-muted mb-0"><br>{% now "j S F Y" %} <hr></p>
                </div>
                
                <div class="task-list-container mt-3">
                    <div class="card m-1 shadow-sm">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <span>This is some Task</span>
                            <div class="btn-group">
                                <button class="btn btn-outline-success btn-sm"><i class="fa fa-check"></i> Mark as Done</button>
                                <button class="btn btn-outline-primary btn-sm"><i class="fa fa-pencil"></i></button>
                                <button class="btn btn-outline-danger btn-sm"><i class="fa fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                    </div>

                <form action="" method="POST" class="mt-0">
                    {% csrf_token %}
                    <div class="input-group">
                        <input type="text" name="task_content" class="form-control" placeholder="Add a task" required>
                        <button class="btn btn-primary" type="submit">
                            <i class="fa fa-plus"></i> Add
                        </button>
                    </div>
                </form>
            </div>

            <div class="col-md-5 col-lg-5">
                <h5 class="mb-3">Completed Tasks</h5>
                <div class="task-list-container">
                    <div class="card m-1 bg-light">
                        <div class="card-body text-muted">
                            <p>This is a completed task.</p>
                        </div>
                    </div>
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
